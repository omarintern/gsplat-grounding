<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>gsplat-grounding · demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0d0e11; color: #d9dde5;
               font-family: 'JetBrains Mono', ui-monospace, monospace; overflow: hidden; }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px;
    background: rgba(20, 22, 27, 0.85); border: 1px solid #22252c;
    border-radius: 10px; padding: 12px 16px; font-size: 11px;
    color: #d9dde5; backdrop-filter: blur(8px); max-width: 380px; line-height: 1.6;
  }
  #hud .title { color: #8ad6c3; font-weight: bold; margin-bottom: 6px; font-size: 12px; letter-spacing: 0.05em; }
  #hud a { color: #e8a84d; text-decoration: none; }
  #hud a:hover { text-decoration: underline; }
  #hud button {
    background: #1a1d23; color: #d9dde5; border: 1px solid #22252c;
    border-radius: 5px; padding: 4px 10px; font: inherit; font-size: 11px;
    cursor: pointer; margin-right: 4px;
  }
  #hud button:hover { background: #22252c; border-color: #8ad6c3; }
  #hud .row { margin-top: 6px; }
  #hud .dim { opacity: 0.6; }
  #drop {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.7); color: #8ad6c3; font-size: 18px;
    opacity: 0; transition: opacity 0.15s ease-out;
  }
  #drop.active { opacity: 1; }
  code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; font-size: 10px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm"
  }
}
</script>
</head>
<body>
<div id="canvas-wrap"></div>
<div id="hud">
  <div class="title">gsplat-grounding · demo</div>
  Drop a Gaussian-splat file (<code>.spz</code>, <code>.ply</code>, <code>.splat</code>, <code>.ksplat</code>) onto the window.
  A capsule character will walk back and forth on the floor the lib derives from your splat.
  <div class="row" id="status">no splat loaded</div>
  <div class="row"><button id="toggleCarpet">toggle floor carpet</button></div>
  <div class="row dim">orbit: drag · zoom: scroll · pan: right-drag</div>
  <div class="row dim"><a href="https://github.com/rumaihi111/gsplat-grounding">github →</a></div>
</div>
<div id="drop">drop a splat file to load</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
